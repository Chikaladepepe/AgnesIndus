<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes OS</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00f2ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--glow); font-family: 'Share Tech Mono', monospace; overflow: hidden; text-transform: uppercase; }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s; }
        .loading-circle { width: 60px; height: 60px; border: 2px solid rgba(0,242,255,0.1); border-top: 2px solid var(--glow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; text-align: center; }
        .bar-container { width: 200px; height: 2px; background: rgba(0,242,255,0.1); }
        #bar { width: 0%; height: 100%; background: var(--glow); box-shadow: 0 0 10px var(--glow); }

        /* HUD */
        #hud { display: none; padding: 20px; box-sizing: border-box; height: 100vh; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 1s; }
        .container { width: 100%; max-width: 500px; border: 1px solid rgba(0,242,255,0.2); padding: 35px 25px; background: rgba(0,0,0,0.9); position: relative; }
        .main-title { font-size: 2rem; text-shadow: 0 0 10px var(--glow); margin-bottom: 5px; text-align: center; letter-spacing: 8px; }
        .status { font-size: 0.6rem; opacity: 0.6; margin-bottom: 25px; border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 10px; text-align: center; }

        /* GOALS */
        .goal-box { text-align: left; margin-bottom: 30px; border-left: 2px solid var(--glow); padding-left: 15px; }
        #editable-content { font-size: 0.85rem; line-height: 1.7; color: #fff; outline: none; }
        #editable-content b { color: var(--glow); }

        /* TIMER */
        .timer-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-top: 1px solid rgba(0,242,255,0.1); padding-top: 20px; }
        .unit { text-align: center; }
        .number { font-size: 1.8rem; font-weight: bold; display: block; }
        .label { font-size: 0.5rem; opacity: 0.5; }

        /* GRID */
        .grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; transform: perspective(500px) rotateX(60deg); }

        .footer { font-size: 0.5rem; opacity: 0.3; width: 100%; display: flex; justify-content: space-between; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-circle"></div>
        <div id="load-msg">SYSTEM BOOTING...</div>
        <div class="bar-container"><div id="bar"></div></div>
    </div>

    <div class="grid"></div>

    <div id="hud">
        <div class="container">
            <div class="main-title">EVOLUTION</div>
            <div class="status">AGNES OS // MASTER_DEVELOPER: JIN</div>

            <div class="goal-box">
                <div id="editable-content" contenteditable="true">
                    >> RANK: <b>MYTHICAL IMMORTAL [100 STARS]</b><br>
                    >> ACADEMIC: <b>SECURE TOP 1 [GRANDMA'S WISH]</b><br>
                    >> PROJECT: <b>AGNES INDUSTRY // JARVIS</b>
                </div>
            </div>

            <div class="timer-row">
                <div class="unit"><span class="number" id="d">00</span><span class="label">DAYS</span></div>
                <div class="unit"><span class="number" id="h">00</span><span class="label">HRS</span></div>
                <div class="unit"><span class="number" id="m">00</span><span class="label">MINS</span></div>
                <div class="unit"><span class="number" id="s">00</span><span class="label">SECS</span></div>
            </div>

            <div class="footer">
                <span onclick="localStorage.clear(); location.reload();">[RESET_OS]</span>
                <span>BGC_SECURE_LINK</span>
            </div>
        </div>
    </div>

    <script>
        // 1. SIMPLE LOADER (NO BUGS)
        const msgs = ["SYNCING DATA...", "JARVIS PROTOTYPE...", "LIFE MIGHT BE STORMY...", "IT CAN'T RAIN FOREVER...", "AGNES INDUSTRY CORE..."];
        let p = 0;
        const bar = document.getElementById('bar');
        const txt = document.getElementById('load-msg');

        const timer = setInterval(() => {
            p += 1;
            bar.style.width = p + "%";
            if(p % 20 === 0) txt.innerText = msgs[Math.floor(Math.random() * msgs.length)];
            if(p >= 100) {
                clearInterval(timer);
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    const h = document.getElementById('hud');
                    h.style.display = 'flex';
                    setTimeout(() => h.style.opacity = '1', 50);
                }, 800);
            }
        }, 30);

        // 2. TIMER (FIXED START BUG)
        if (!localStorage.getItem('agnes_start')) {
            localStorage.setItem('agnes_start', Date.now());
        }

        function runTimer() {
            const start = localStorage.getItem('agnes_start');
            const diff = Date.now() - start;

            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);

            document.getElementById('d').innerText = days.toString().padStart(2, '0');
            document.getElementById('h').innerText = hours.toString().padStart(2, '0');
            document.getElementById('m').innerText = mins.toString().padStart(2, '0');
            document.getElementById('s').innerText = secs.toString().padStart(2, '0');
        }
        setInterval(runTimer, 1000);
        runTimer();

        // 3. EDITABLE GOALS
        const box = document.getElementById('editable-content');
        if(localStorage.getItem('agnes_goals')) {
            box.innerHTML = localStorage.getItem('agnes_goals');
        }
        box.addEventListener('input', () => {
            localStorage.setItem('agnes_goals', box.innerHTML);
        });
    </script>
</body>
</html>
