    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00f2ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--glow); font-family: 'Share Tech Mono', monospace; overflow: hidden; text-transform: uppercase; }

        /* LOADING SCREEN */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; cursor: pointer; }
        .loading-circle { width: 80px; height: 80px; border: 2px solid transparent; border-top: 2px solid var(--glow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; text-align: center; }
        .progress-container { width: 200px; height: 2px; background: rgba(0,242,255,0.1); }
        #progress-bar { width: 0%; height: 100%; background: var(--glow); transition: width 0.1s; }

        /* HUD MAIN */
        #hud { display: none; padding: 20px; box-sizing: border-box; height: 100vh; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 1s; }
        .hud-container { width: 100%; max-width: 500px; border: 1px solid rgba(0,242,255,0.2); padding: 30px 20px; background: rgba(0,0,0,0.9); position: relative; }
        
        .main-title { font-size: 1.8rem; text-shadow: 0 0 10px var(--glow); margin-bottom: 5px; letter-spacing: 5px; text-align: center; }
        .status { font-size: 0.6rem; opacity: 0.6; margin-bottom: 25px; border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 10px; text-align: center; }

        /* EDITABLE OBJECTIVES */
        .goal-section { text-align: left; margin-bottom: 25px; border-left: 2px solid var(--glow); padding-left: 15px; }
        #editable-goals { font-size: 0.8rem; line-height: 1.6; color: #fff; outline: none; min-height: 50px; }
        #editable-goals b { color: var(--glow); }

        /* COUNTER */
        .counter-row { display: flex; justify-content: space-around; margin-bottom: 20px; border-top: 1px solid rgba(0,242,255,0.1); padding-top: 15px; }
        .unit { text-align: center; }
        .number { font-size: 1.5rem; font-weight: bold; display: block; }
        .label { font-size: 0.5rem; opacity: 0.5; }

        /* GRID */
        .grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; transform: perspective(500px) rotateX(60deg); animation: move 12s linear infinite; }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(30px); } }

        .footer { font-size: 0.5rem; opacity: 0.3; width: 100%; display: flex; justify-content: space-between; margin-top: 15px; }
        .reset-btn { cursor: pointer; }
        .reset-btn:hover { opacity: 1; color: red; }
    </style>
</head>
