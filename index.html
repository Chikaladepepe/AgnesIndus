<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes OS | Developer Mode</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00f2ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--glow); font-family: 'Share Tech Mono', monospace; overflow: hidden; text-transform: uppercase; }

        /* LOADING SCREEN */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        .loading-circle { width: 100px; height: 100px; border: 2px solid transparent; border-top: 2px solid var(--glow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; height: 20px; }
        .progress-container { width: 250px; height: 2px; background: rgba(0,242,255,0.1); }
        #progress-bar { width: 0%; height: 100%; background: var(--glow); box-shadow: 0 0 10px var(--glow); }

        /* HUD */
        .hud { display: none; padding: 30px; box-sizing: border-box; height: 100vh; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 2s; }
        .hud-container { width: 100%; max-width: 600px; border: 1px solid rgba(0,242,255,0.2); padding: 30px; background: rgba(0,0,0,0.9); position: relative; }
        
        .main-title { font-size: 2.5rem; text-shadow: 0 0 15px var(--glow); margin-bottom: 5px; }
        .status { font-size: 0.7rem; opacity: 0.6; margin-bottom: 30px; border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 10px; }

        /* EDITABLE GOALS */
        .goal-section { text-align: left; margin-bottom: 30px; }
        .goal-item { font-size: 0.85rem; margin: 10px 0; display: flex; gap: 10px; }
        .goal-item span { color: #fff; cursor: text; outline: none; border-bottom: 1px dashed rgba(255,255,255,0.3); }
        .goal-item span:focus { border-bottom: 1px solid var(--glow); color: var(--glow); }

        /* COUNTER */
        .counter-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .number { font-size: 2rem; font-weight: bold; }
        .label { font-size: 0.6rem; opacity: 0.5; display: block; }

        /* GRID BACKGROUND */
        .grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; transform: perspective(500px) rotateX(60deg); animation: move 10s linear infinite; }
        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        .footer { font-size: 0.6rem; opacity: 0.4; width: 100%; display: flex; justify-content: space-between; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-circle"></div>
        <div id="load-msg">INITIALIZING SYSTEM...</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="grid"></div>

    <div class="hud" id="hud">
        <div class="hud-container">
            <div class="main-title">EVOLUTION</div>
            <div class="status">AGNES OS v1.0 // MASTER DEVELOPER: JIN</div>

            <div class="goal-section">
                <div style="font-size: 0.6rem; opacity: 0.5; margin-bottom: 10px;">[OBJECTIVES_EDIT_MODE]</div>
                <div class="goal-item">>> RANK: <span contenteditable="true" id="goal1">MYTHICAL IMMORTAL [100 STARS]</span></div>
                <div class="goal-item">>> ACADEMIC: <span contenteditable="true" id="goal2">SECURE TOP 1 [GRANDMA'S WISH]</span></div>
                <div class="goal-item">>> PROJECT: <span contenteditable="true" id="goal3">AGNES INDUSTRY // JARVIS // G80 M3</span></div>
            </div>

            <div class="counter-row">
                <div><span class="number" id="days">00</span><span class="label">DAYS</span></div>
                <div><span class="number" id="hours">00</span><span class="label">HRS</span></div>
                <div><span class="number" id="minutes">00</span><span class="label">MINS</span></div>
                <div><span class="number" id="seconds">00</span><span class="label">SECS</span></div>
            </div>

            <div class="footer">
                <span>SYSTEM: STABLE</span>
                <span>BGC_LINK: ONLINE</span>
            </div>
        </div>
    </div>

    <script>
        // LOADING SEQUENCE
        const quotes = [
            "CONNECTING TO BGC HQ...",
            "SYNCING JARVIS_BETA_V1...",
            "JARVIS PROTOTYPE LOADING...",
            "CALIBRATING STEALTH MODE...",
            "LIFE MIGHT BE STORMY...",
            "IT CAN'T RAIN FOREVER...",
            "ESTABLISHING BILLIONAIRE_ARC...",
            "REMOVING LIMITATIONS..."
        ];

        let i = 0;
        const msgEl = document.getElementById('load-msg');
        const bar = document.getElementById('progress-bar');
        
        const loadInterval = setInterval(() => {
            msgEl.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            i += 2;
            bar.style.width = i + "%";
            if (i >= 100) {
                clearInterval(loadInterval);
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    const hud = document.getElementById('hud');
                    hud.style.display = 'flex';
                    setTimeout(() => hud.style.opacity = '1', 50);
                }, 1000);
            }
        }, 100);

        // COUNTER LOGIC
        // Manually set this to the date you decided to change
        const startTime = new Date("2024-05-15T22:00:00"); 

        function updateCounter() {
            const diff = new Date() - startTime;
            document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateCounter, 1000);

        // PERSISTENT EDITABLE GOALS
        const goals = ['goal1', 'goal2', 'goal3'];
        goals.forEach(id => {
            const el = document.getElementById(id);
            // Load saved
            if(localStorage.getItem(id)) el.innerText = localStorage.getItem(id);
            // Save on change
            el.addEventListener('input', () => {
                localStorage.setItem(id, el.innerText);
            });
        });
    </script>
</body>
  </html>
