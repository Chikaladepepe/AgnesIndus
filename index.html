<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Agnes OS | Master Developer</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00f2ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--glow); font-family: 'Share Tech Mono', monospace; overflow: hidden; text-transform: uppercase; }

        /* LOADING SCREEN */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        .loading-circle { width: 100px; height: 100px; border: 2px solid transparent; border-top: 2px solid var(--glow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; height: 20px; text-align: center; width: 80%; }
        .progress-container { width: 250px; height: 2px; background: rgba(0,242,255,0.1); }
        #progress-bar { width: 0%; height: 100%; background: var(--glow); box-shadow: 0 0 10px var(--glow); }

        /* HUD MAIN */
        .hud { display: none; padding: 30px; box-sizing: border-box; height: 100vh; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 2s; }
        .hud-container { width: 100%; max-width: 600px; border: 1px solid rgba(0,242,255,0.2); padding: 40px 30px; background: rgba(0,0,0,0.9); position: relative; box-shadow: 0 0 40px rgba(0,242,255,0.1); }
        
        .main-title { font-size: 2.2rem; text-shadow: 0 0 15px var(--glow); margin-bottom: 5px; letter-spacing: 10px; }
        .status { font-size: 0.65rem; opacity: 0.6; margin-bottom: 30px; border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 10px; letter-spacing: 2px; }

        /* EDITABLE OBJECTIVES */
        .goal-section { text-align: left; margin-bottom: 30px; border-left: 2px solid var(--glow); padding-left: 20px; }
        #editable-goals { font-size: 0.85rem; line-height: 1.8; color: #fff; outline: none; }
        #editable-goals b { color: var(--glow); }

        /* COUNTER */
        .counter-row { display: flex; justify-content: space-between; margin-bottom: 30px; border-top: 1px solid rgba(0,242,255,0.1); padding-top: 20px; }
        .unit { text-align: center; }
        .number { font-size: 2rem; font-weight: bold; display: block; }
        .label { font-size: 0.55rem; opacity: 0.5; }

        /* GRID */
        .grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; transform: perspective(500px) rotateX(60deg); animation: move 12s linear infinite; }
        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        .footer { font-size: 0.55rem; opacity: 0.3; width: 100%; display: flex; justify-content: space-between; margin-top: 20px; cursor: pointer; }
    </style>
</head>
